context:
  name: arrow-odbc
  version: "10.4.0"
  build: 0

recipe:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace("-", "_") }}-${{ version }}.tar.gz
  sha256: 7453cbf9cb9318696c7df7ea10eb2dad182c9bd4bbd010ec1b785fa45dbfb470

build:
  number: ${{ build }}

outputs:
  - package:
      name: ${{ name }}
      version: ${{ version }}
    build:
      number: ${{ build }}
      script:
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
          CARGO_PROFILE_RELEASE_LTO: fat
          # arrow-odbc deliberately uses the system's ODBC driver manager at
          # runtime and must not bundle libodbc. Skip maturin's wheel-repair
          # step, which on macOS (since maturin 1.13) would otherwise fail to
          # resolve @rpath/libodbc.2.dylib or bundle it into the wheel.
          MATURIN_PEP517_ARGS: --auditwheel=skip
        content:
          - if: unix
            then:
              - export RUSTFLAGS="-Clink-args=-Wl,-L$PREFIX/lib"
          - ${{ PYTHON }} -m pip install --no-deps --no-build-isolation .
          - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    requirements:
      build:
        - if: build_platform != target_platform
          then:
            - maturin >=1,<2
            - cffi
            - python
            - cross-python_${{ target_platform }}
            - crossenv
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - ${{ compiler('rust') }}
        - cargo-bundle-licenses
      host:
        - python
        - cffi
        - maturin >=1,<2
        - pip
        - pyarrow >=8
        - if: unix
          then:
            - unixodbc
        - if: osx
          then:
            - libiconv
      run:
        - python
        - cffi
        - pyarrow >=8
    tests:
      - python:
          imports:
            - arrow_odbc
          pip_check: true
  - package:
      name: ${{ name | replace("-", "_") }}
    build:
      noarch: generic
      number: ${{ build }}
      skip:
        - not target_platform == "linux-64"
    requirements:
      run:
        - ${{ pin_subpackage(name, lower_bound="x.x.x", upper_bound="x.x.x") }}
    about:
      license_file: []
    tests:
      - python:
          imports:
            - arrow_odbc
          pip_check: true

about:
  homepage: https://github.com/pacman82/arrow-odbc-py
  repository: https://github.com/pacman82/arrow-odbc-py
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Read Apache Arrow batches from ODBC data sources in Python

extra:
  recipe-maintainers:
    - jonashaag
    - timkpaine
    - pacman82
    - pavelzw
